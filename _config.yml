# Theme
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-remote-theme

# Site info
title: "Mars-Lab"
description: "RFIC • RFID • Microelectronics • Phased Arrays • Wireless Systems"

# Appearance
show_downloads: false

# Custom styling (important)
google_analytics: # вставь если нужно

# Navigation (если будешь делать страницы)
header_pages:
  - index.md
  - projects.md
  - publications.md

# Markdown rendering
markdown: kramdown
highlighter: rouge

# Enable HTML inside markdown (ВАЖНО для твоего дизайна)
kramdown:
  input: GFM
  parse_block_html: true

# Collections (если захочешь структурировать проекты)
collections:
  projects:
    output: true
  publications:
    output: true
