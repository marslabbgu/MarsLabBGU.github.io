# Theme Settings
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Site info
title: "Mars-Lab"
description: "RFIC • RFID • Microelectronics • Phased Arrays • Wireless Systems"

# Appearance
show_downloads: false
google_analytics: 

# Navigation
# Note: Cayman usually handles navigation differently; 
# ensuring these files exist in your root directory is key.
header_pages:
  - index.md
  - projects.md
  - publications.md

# Markdown rendering
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  parse_block_html: true

# Collections
collections:
  projects:
    output: true
  publications:
    output: true
