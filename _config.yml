# Theme Settings
# Using the "Cayman-Dark" fork which is optimized for dark mode
remote_theme: KTibow/cayman-dark
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Site info
title: "Mars-Lab"
description: "RFIC • RFID • Microelectronics • Phased Arrays • Wireless Systems"
url: "https://marslabbgu.github.io" # Replace with your actual URL
author: "Mars Lab BGU"

# Appearance
show_downloads: false
google_analytics: 

# Navigation (Improvements)
# Note: Cayman-Dark allows you to toggle light/dark via front-matter
light_mode: false 

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/
  publications:
    output: true
    permalink: /publications/:path/

# Rendering
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  parse_block_html: true
